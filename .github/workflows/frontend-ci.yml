name: Frontend CI

on:
  push:
    paths:
      - "beelicious_fe/**"
  pull_request:
    paths:
      - "beelicious_fe/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: beelicious_fe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build
