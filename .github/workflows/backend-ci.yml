name: Backend CI

on:
  push:
    paths:
      - "beelicious_be/**"
  pull_request:
    paths:
      - "beelicious_be/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: beelicious_be

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run backend (or tests)
        run: npm test
